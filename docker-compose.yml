services:
  pgvector_db:
    image: ankane/pgvector:v0.5.1 # veya kullandığınız imaj
    container_name: pgvector_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tasks
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d tasks"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      pgvector_db:
        condition: service_healthy
    container_name: ai_app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://user:password@pgvector_db:5432/tasks
      OLLAMA_URL: http://host.docker.internal:11434
    
    extra_hosts:
      - "host.docker.internal:host-gateway"


volumes:
  pgdata:

